name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: the workflow only needs to read the repo.
permissions:
  contents: read

# Pinned tool versions for reproducibility (no "latest").
# BUN_VERSION matches the lockfile (bun.lock configVersion: 1 → Bun 1.3.x) and
# the team's local Bun. SUPABASE_CLI_VERSION must be an existing release tag;
# bump deliberately. See docs/stage-1.5-security-closure-report.md.
env:
  BUN_VERSION: "1.3.14"
  SUPABASE_CLI_VERSION: "2.33.9"

jobs:
  quality:
    name: Quality (typecheck, lint, format, test, build)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      # Reproducible install from the committed lockfile.
      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Core checks — all MANDATORY. Separate steps so a failure points at the
      # exact gate. No step is allowed to fail silently.
      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Format check
        run: bun run format:check

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build

  migrations-local:
    name: Migrations build from empty (local)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Proves every repository migration applies cleanly to a fresh LOCAL Supabase
    # database (Docker on the runner). Needs no production credentials and never
    # touches the live project. This is the authoritative migration check —
    # `db lint --linked` (below) inspects the deployed DB and does NOT validate
    # pending local migrations.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: ${{ env.SUPABASE_CLI_VERSION }}

      # The repo intentionally ships no config.toml (it would pin a project ref);
      # generate a default one locally only for this ephemeral validation, then
      # expose the `api` schema through PostgREST so the REST smoke test below
      # exercises the same Data API surface the app uses in production. `private`
      # is never exposed. (Production exposure is set in the dashboard; this keeps
      # a fresh local/CI stack faithful to it.)
      - name: Initialize local Supabase config (expose api schema)
        run: |
          if [ ! -f supabase/config.toml ]; then
            supabase init
          fi
          if ! grep -qE '^\s*schemas\s*=.*"api"' supabase/config.toml; then
            sed -i -E 's/^(\s*schemas\s*=\s*\[)([^]]*)\]/\1\2, "api"]/' supabase/config.toml
          fi
          grep -qE '"api"' supabase/config.toml \
            || { echo "config.toml: failed to expose the api schema"; exit 1; }
          if grep -qE '^\s*schemas\s*=.*"private"' supabase/config.toml; then
            echo "config.toml: the private schema must NOT be exposed"; exit 1
          fi

      # `supabase start` boots a local stack and APPLIES all migrations in order.
      # If any migration errors, this step fails the job. We only need Postgres +
      # PostgREST (the REST smoke + psql DB tests below); the edge-runtime, studio,
      # imgproxy, vector, logflare, inbucket and realtime containers are unused
      # here and edge-runtime in particular intermittently fails its image pull /
      # health check with "Error status 502", flaking the whole job. Excluding the
      # unneeded services makes this job depend only on the DB it actually tests.
      - name: Apply migrations to a fresh local database
        run: supabase start -x edge-runtime,studio,imgproxy,vector,logflare,inbucket,realtime

      # REST smoke test: a SQL migration succeeding does NOT prove PostgREST can
      # call the RPCs the app uses. Hit the Data API on the fresh stack to assert
      # the api schema is reachable, anon cannot reach privileged RPCs, and the
      # service role can.
      - name: REST smoke test (PostgREST Data API)
        run: |
          eval "$(supabase status -o env | sed 's/^/export /')"
          BASE="${API_URL:-http://127.0.0.1:54321}"
          echo "API base: $BASE"
          # RPCs live in the `api` schema; PostgREST selects it via Content-Profile
          # (this is exactly what the app's supabase.schema("api").rpc(...) sends).
          # 1. api schema is reachable via anon (public read RPC → 200). Proves the
          #    anon role has both USAGE on the schema and EXECUTE on the function.
          code=$(curl -s -o /dev/null -w '%{http_code}' -X POST "$BASE/rest/v1/rpc/catalog_facets" \
            -H "apikey: $ANON_KEY" -H "Authorization: Bearer $ANON_KEY" \
            -H "Content-Profile: api" -H "Content-Type: application/json" -d '{}')
          [ "$code" = "200" ] || { echo "FAIL: anon api.catalog_facets expected 200, got $code"; exit 1; }
          # 2. a privileged api RPC is NOT executable by anon (denied → 4xx, not 200).
          code=$(curl -s -o /dev/null -w '%{http_code}' -X POST "$BASE/rest/v1/rpc/set_product_media" \
            -H "apikey: $ANON_KEY" -H "Authorization: Bearer $ANON_KEY" \
            -H "Content-Profile: api" -H "Content-Type: application/json" \
            -d '{"p_code":"x","p_items":[],"p_actor":"00000000-0000-0000-0000-000000000000"}')
          case "$code" in 401|403|404) : ;; *) echo "FAIL: anon set_product_media expected deny, got $code"; exit 1 ;; esac
          # 3. the service role CAN reach it (executes, then raises a stable code → 400).
          code=$(curl -s -o /dev/null -w '%{http_code}' -X POST "$BASE/rest/v1/rpc/set_product_media" \
            -H "apikey: $SERVICE_ROLE_KEY" -H "Authorization: Bearer $SERVICE_ROLE_KEY" \
            -H "Content-Profile: api" -H "Content-Type: application/json" \
            -d '{"p_code":"x","p_items":[],"p_actor":"00000000-0000-0000-0000-000000000000"}')
          case "$code" in 400|404) : ;; *) echo "FAIL: service_role set_product_media expected 400, got $code"; exit 1 ;; esac
          echo "REST smoke test passed."

      # DB integration tests: assert the Stage-2 Pass-2 database guards
      # (stock-write guard, set_inventory validation, ledger immutability,
      # FK RESTRICT, first-variant conservation, owner-only purge, reorder
      # validation, bulk idempotency) against the freshly-migrated local DB.
      # Any unhandled error or `FAIL:` RAISE aborts (ON_ERROR_STOP) and fails CI.
      - name: DB integration tests (pass-2 guards)
        run: |
          command -v psql >/dev/null || { sudo apt-get update && sudo apt-get install -y postgresql-client; }
          DB_URL=$(supabase status -o env 2>/dev/null | sed -n 's/^DB_URL=//p' | tr -d '"')
          [ -z "$DB_URL" ] && DB_URL="postgresql://postgres:postgres@127.0.0.1:54322/postgres"
          echo "Running DB integration tests..."
          psql "$DB_URL" -v ON_ERROR_STOP=1 -f supabase/tests/pass2_db.test.sql

      # DB integration tests: Stage-3 order schema invariants (pricing balance,
      # owner XOR, line-total, append-only status history, verified-TrxID guard,
      # idempotency uniqueness, RPC-only RLS posture) against the migrated DB.
      - name: DB integration tests (pass-3 orders)
        run: |
          command -v psql >/dev/null || { sudo apt-get update && sudo apt-get install -y postgresql-client; }
          DB_URL=$(supabase status -o env 2>/dev/null | sed -n 's/^DB_URL=//p' | tr -d '"')
          [ -z "$DB_URL" ] && DB_URL="postgresql://postgres:postgres@127.0.0.1:54322/postgres"
          psql "$DB_URL" -v ON_ERROR_STOP=1 -f supabase/tests/pass3_db.test.sql

      # Stage-3 Pass-4 order LIFECYCLE + customer reads: bkash happy path
      # (submit→verify→confirm→…→delivered→returned+restock), reject→retry, COD,
      # measurements round-trip, duplicate-TrxID flag, guest-track scoping,
      # transition guards, admin_order_stats, and pass-4 RPC grant posture.
      - name: DB integration tests (pass-4 lifecycle)
        run: |
          command -v psql >/dev/null || { sudo apt-get update && sudo apt-get install -y postgresql-client; }
          DB_URL=$(supabase status -o env 2>/dev/null | sed -n 's/^DB_URL=//p' | tr -d '"')
          [ -z "$DB_URL" ] && DB_URL="postgresql://postgres:postgres@127.0.0.1:54322/postgres"
          psql "$DB_URL" -v ON_ERROR_STOP=1 -f supabase/tests/pass4_db.test.sql

      # Stage-4 customer-account schema: RPC-only posture, CHECK bounds,
      # one-default-per-user partial index, case-insensitive measurement-name
      # dedupe, updated_at touch trigger, auth.users cascade.
      - name: DB integration tests (stage-4 accounts)
        run: |
          command -v psql >/dev/null || { sudo apt-get update && sudo apt-get install -y postgresql-client; }
          DB_URL=$(supabase status -o env 2>/dev/null | sed -n 's/^DB_URL=//p' | tr -d '"')
          [ -z "$DB_URL" ] && DB_URL="postgresql://postgres:postgres@127.0.0.1:54322/postgres"
          psql "$DB_URL" -v ON_ERROR_STOP=1 -f supabase/tests/stage4_db.test.sql

      # Stage-5 audit-read RPC: grant posture (service-role only), owner-only
      # authorization (admin/non-staff/null rejected), actor id→email/name/role
      # resolution, newest-first ordering, filtering (action/search/date) and
      # limit/offset pagination against the migrated DB.
      - name: DB integration tests (stage-5 audit)
        run: |
          command -v psql >/dev/null || { sudo apt-get update && sudo apt-get install -y postgresql-client; }
          DB_URL=$(supabase status -o env 2>/dev/null | sed -n 's/^DB_URL=//p' | tr -d '"')
          [ -z "$DB_URL" ] && DB_URL="postgresql://postgres:postgres@127.0.0.1:54322/postgres"
          psql "$DB_URL" -v ON_ERROR_STOP=1 -f supabase/tests/stage5_db.test.sql

      # Stage-6: banners (grant posture, upsert create/update/not-found,
      # media-library-only images, CHECK coherence, public window filtering +
      # sort ordering + no updated_by leak, live flag, delete_media in-use guard,
      # banner.* audits), the policies CMS (grant posture, migration seed,
      # draft/publish/revision/prune/restore/discard lifecycle, bounds, page.*
      # audits), the report aggregates (service-role-only grants, the
      # confirmed/delivered revenue definitions, range bounds, top products,
      # coupon ledger, courier delivered + avg-hours, COD reconciliation,
      # non-staff rejection) and the size charts (grant posture, migration
      # seed, deep jsonb validation, CRUD + size_chart.* audits).
      - name: DB integration tests (stage-6 content)
        run: |
          command -v psql >/dev/null || { sudo apt-get update && sudo apt-get install -y postgresql-client; }
          DB_URL=$(supabase status -o env 2>/dev/null | sed -n 's/^DB_URL=//p' | tr -d '"')
          [ -z "$DB_URL" ] && DB_URL="postgresql://postgres:postgres@127.0.0.1:54322/postgres"
          psql "$DB_URL" -v ON_ERROR_STOP=1 -f supabase/tests/stage6_db.test.sql

      # Stage-7: self-serve account deletion (api.delete_account) — orders
      # anonymized to guest ownership (records preserved, XOR intact, hash
      # rotated), personal data cascaded, auth.users removed, account.deleted
      # audit written, staff/unknown rejected, service-role-only grant posture.
      - name: DB integration tests (stage-7 hardening)
        run: |
          command -v psql >/dev/null || { sudo apt-get update && sudo apt-get install -y postgresql-client; }
          DB_URL=$(supabase status -o env 2>/dev/null | sed -n 's/^DB_URL=//p' | tr -d '"')
          [ -z "$DB_URL" ] && DB_URL="postgresql://postgres:postgres@127.0.0.1:54322/postgres"
          psql "$DB_URL" -v ON_ERROR_STOP=1 -f supabase/tests/stage7_db.test.sql

      # Two-connection concurrency test: launches parallel psql sessions to verify
      # that advisory-lock serialization in api.bulk_set_inventory actually works
      # across genuine concurrent database connections (not single-session sequential).
      # NOTE: test data persists (movements are append-only); the ephemeral local
      # stack is torn down in the next step. This is intentional.
      - name: Concurrency test (two-connection advisory lock)
        run: |
          command -v psql >/dev/null || { sudo apt-get update && sudo apt-get install -y postgresql-client; }
          DB_URL=$(supabase status -o env 2>/dev/null | sed -n 's/^DB_URL=//p' | tr -d '"')
          [ -z "$DB_URL" ] && DB_URL="postgresql://postgres:postgres@127.0.0.1:54322/postgres"
          export DB_URL
          bash supabase/tests/concurrency.test.sh

      # Stage-7 P2: money-path races under genuine parallel connections —
      # oversell (product-row FOR UPDATE), duplicate order (idempotency_keys
      # unique key), coupon exhaustion (coupon-row FOR UPDATE + usage_count).
      - name: Concurrency test (order money-path races)
        run: |
          command -v psql >/dev/null || { sudo apt-get update && sudo apt-get install -y postgresql-client; }
          DB_URL=$(supabase status -o env 2>/dev/null | sed -n 's/^DB_URL=//p' | tr -d '"')
          [ -z "$DB_URL" ] && DB_URL="postgresql://postgres:postgres@127.0.0.1:54322/postgres"
          export DB_URL
          bash supabase/tests/concurrency-orders.test.sh

      - name: Tear down local stack
        if: always()
        run: supabase stop --no-backup || true

  supabase-lint:
    name: Supabase DB lint (advisory, deployed DB)
    runs-on: ubuntu-latest
    needs: quality
    # Push-only (never fork PRs → secrets are never exposed to untrusted PRs).
    if: ${{ github.event_name == 'push' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # `db lint --linked` needs project access AND database connectivity, so it
      # requires the access token, project ref AND db password. When ANY is
      # absent we SKIP visibly with a notice — never a misleading passing no-op.
      # NOTE: this lints the DEPLOYED database; it does NOT prove pending local
      # migrations apply (the migrations-local job does that).
      - name: Detect Supabase credentials
        id: creds
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          if [ -n "$SUPABASE_ACCESS_TOKEN" ] && [ -n "$SUPABASE_PROJECT_ID" ] && [ -n "$SUPABASE_DB_PASSWORD" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=Supabase DB lint skipped::Requires SUPABASE_ACCESS_TOKEN, SUPABASE_PROJECT_ID and SUPABASE_DB_PASSWORD (db lint --linked needs database connectivity). Intentionally skipped — not a passing no-op."
          fi

      - name: Setup Supabase CLI
        if: steps.creds.outputs.available == 'true'
        uses: supabase/setup-cli@v1
        with:
          version: ${{ env.SUPABASE_CLI_VERSION }}

      - name: Database lint (linked)
        if: steps.creds.outputs.available == 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
          # Consumed by the CLI to avoid an interactive password prompt.
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          supabase link --project-ref "$SUPABASE_PROJECT_ID"
          supabase db lint --linked --level warning
