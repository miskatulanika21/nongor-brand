name: Backup (DB + Storage)

# Scheduled off-Supabase logical backup (Stage 7 / P6). Supabase's Free tier has
# no automated backups/PITR, so this is the safety net: a daily encrypted dump of
# the database (roles + schema + data + customer auth rows) and the
# non-re-derivable Storage bucket (payment-evidence), retained as a GitHub
# artifact. Restorability is proven separately by restore-drill.yml.
#
# SAFETY: every step reads from prod (dumps are SELECTs, storage is download).
# Nothing writes to production.
#
# Secrets used:
#   SUPABASE_ACCESS_TOKEN, SUPABASE_PROJECT_ID, SUPABASE_DB_PASSWORD  (already in CI)
#   SUPABASE_SERVICE_ROLE_KEY          — to read the private bucket (owner-added)
#   BACKUP_ENCRYPTION_PASSPHRASE       — symmetric key for the data-bearing archive
#
# Without BACKUP_ENCRYPTION_PASSPHRASE the job still runs but archives ONLY the
# non-sensitive roles/schema (never unencrypted customer data/PII in an artifact).

on:
  schedule:
    - cron: "17 2 * * *" # 02:17 UTC daily (~07:47 Asia/Dhaka), off-peak
  workflow_dispatch:

concurrency:
  group: backup-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  BUN_VERSION: "1.3.14"
  SUPABASE_CLI_VERSION: "2.33.9"

jobs:
  backup:
    name: Dump DB + Storage → encrypted artifact
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Detect DB credentials
        id: creds
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          if [ -n "$SUPABASE_ACCESS_TOKEN" ] && [ -n "$SUPABASE_PROJECT_ID" ] && [ -n "$SUPABASE_DB_PASSWORD" ]; then
            echo "db=true" >> "$GITHUB_OUTPUT"
          else
            echo "db=false" >> "$GITHUB_OUTPUT"
            echo "::error title=Backup cannot run::Requires SUPABASE_ACCESS_TOKEN, SUPABASE_PROJECT_ID and SUPABASE_DB_PASSWORD."
            exit 1
          fi

      - name: Dump database (roles + schema + data + auth)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_CLI_VERSION: ${{ env.SUPABASE_CLI_VERSION }}
        run: bash scripts/backup-db.sh backup

      - name: Back up Storage (payment-evidence)
        env:
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL || vars.SUPABASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || vars.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ -z "$SUPABASE_SERVICE_ROLE_KEY" ] || { [ -z "$SUPABASE_URL" ] && [ -z "$VITE_SUPABASE_URL" ]; }; then
            echo "::warning title=Storage backup skipped::Set SUPABASE_SERVICE_ROLE_KEY and SUPABASE_URL to back up the private payment-evidence bucket."
            mkdir -p backup/storage
            echo '{"skipped":"no SUPABASE_SERVICE_ROLE_KEY/SUPABASE_URL"}' > backup/storage/manifest.json
          else
            bun run scripts/backup-storage.mjs --out backup/storage
          fi

      - name: Package + encrypt
        id: pkg
        env:
          PASS: ${{ secrets.BACKUP_ENCRYPTION_PASSPHRASE }}
        run: |
          STAMP=$(date -u +%Y%m%dT%H%M%SZ)
          if [ -n "$PASS" ]; then
            tar czf "backup-$STAMP.tgz" -C backup .
            printf '%s' "$PASS" | gpg --batch --yes --passphrase-fd 0 \
              --symmetric --cipher-algo AES256 -o "backup-$STAMP.tgz.gpg" "backup-$STAMP.tgz"
            shred -u "backup-$STAMP.tgz" 2>/dev/null || rm -f "backup-$STAMP.tgz"
            echo "artifact=backup-$STAMP.tgz.gpg" >> "$GITHUB_OUTPUT"
            echo "::notice title=Backup encrypted::Full encrypted backup (DB + storage) produced: backup-$STAMP.tgz.gpg"
          else
            # No passphrase → never ship unencrypted customer data. Archive only the
            # non-sensitive roles + schema so the run is still useful (structure DR).
            tar czf "backup-$STAMP-nosecrets.tgz" -C backup roles.sql schema.sql MANIFEST.txt
            echo "artifact=backup-$STAMP-nosecrets.tgz" >> "$GITHUB_OUTPUT"
            echo "::warning title=Partial backup (no encryption key)::BACKUP_ENCRYPTION_PASSPHRASE is unset — archived ONLY roles+schema. Customer data.sql/auth.sql/storage were OMITTED to avoid unencrypted PII in an artifact. Add the passphrase for a full backup."
          fi

      - name: Upload backup artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.pkg.outputs.artifact }}
          path: ${{ steps.pkg.outputs.artifact }}
          retention-days: 30
          if-no-files-found: error
