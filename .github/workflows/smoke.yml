name: Post-deploy checks

# Runs the read-only Playwright smoke suite AND the axe accessibility suite
# against a freshly-deployed URL.
#
# Two entry points:
#   1. deployment_status — Vercel's GitHub integration creates a GitHub
#      Deployment + Status for every preview and production deploy. When one
#      reports `success` we smoke its URL. This gives every PR preview and every
#      production promotion an automatic gate. (deployment_status workflows run
#      from the DEFAULT branch, so this file must live on main to fire.)
#   2. workflow_dispatch — manual run against any URL, used for the rollback
#      drill and ad-hoc prod re-checks. See docs/stage-7-cicd-and-rollback.md.
#
# The suite is READ-ONLY (GETs + the STABLE quote_order RPC), so it is safe to
# point at production. It never needs secrets.

on:
  deployment_status:
  workflow_dispatch:
    inputs:
      url:
        description: "Base URL to smoke (e.g. https://nongor-brand.vercel.app)"
        required: true
        type: string
  # Weekly axe run against production, kept as a backstop: it catches drift on
  # a quiet week when nothing deploys. Production deploy_status events now smoke
  # the public domain directly (see "Resolve target URL"), so this is no longer
  # the only run that executes — PREVIEW runs are still gated on
  # VERCEL_AUTOMATION_BYPASS_SECRET, since their per-deploy URLs are protected.
  schedule:
    - cron: "0 3 * * 1"

# Never smoke the same target twice concurrently; cancel a superseded run.
concurrency:
  group: smoke-${{ github.event.deployment_status.environment_url || github.event.deployment_status.target_url || inputs.url || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  BUN_VERSION: "1.3.14"

jobs:
  smoke:
    name: Smoke + a11y (deployed URL)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Only run on a SUCCESSFUL deployment (skip pending/failure/error states),
    # or on a manual dispatch. Non-success deployment_status events are no-ops.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' || github.event.deployment_status.state == 'success' }}
    steps:
      - name: Resolve target URL
        id: target
        env:
          # Prefer the live deployment URL (environment_url); fall back to
          # target_url; for manual runs use the provided input.
          ENV_URL: ${{ github.event.deployment_status.environment_url }}
          TGT_URL: ${{ github.event.deployment_status.target_url }}
          INPUT_URL: ${{ inputs.url }}
          BYPASS: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
          EVENT: ${{ github.event_name }}
          # Vercel sets this to exactly "Production" or "Preview".
          DEPLOY_ENV: ${{ github.event.deployment_status.environment }}
        run: |
          # Manual dispatch wins. Otherwise prefer the live deployment URL
          # (environment_url); only fall back to target_url if it is the SITE and
          # not Vercel's dashboard inspector (vercel.com/...), which some
          # integration versions put in target_url and which is NOT smokeable.
          PROD_URL="https://nongorr.com"

          URL="$INPUT_URL"
          # Scheduled runs carry no deployment payload and no input — they always
          # target the public production domain.
          if [ -z "$URL" ] && [ "$EVENT" = "schedule" ]; then
            URL="$PROD_URL"
          fi
          # A PRODUCTION deployment_status still hands us the per-deploy URL
          # (nongor-brand-<hash>-nongorr.vercel.app), which Vercel keeps behind
          # Deployment Protection — so smoking it asserted against an SSO login
          # page ("Login – Vercel") rather than the site. Smoke the public domain
          # instead: it is unprotected, needs no bypass secret, and is the surface
          # customers actually load, which is what a post-deploy gate should prove.
          # Previews keep using their per-deploy URL (each one is a distinct build).
          if [ -z "$URL" ] && printf '%s' "$DEPLOY_ENV" | grep -qi '^production$'; then
            URL="$PROD_URL"
          fi
          if [ -z "$URL" ]; then
            URL="$ENV_URL"
          fi
          if [ -z "$URL" ] && [ -n "$TGT_URL" ] && ! printf '%s' "$TGT_URL" | grep -qi 'vercel\.com'; then
            URL="$TGT_URL"
          fi
          if [ -z "$URL" ]; then
            echo "::notice title=Smoke skipped::No smokeable deployment URL on this event (only a dashboard/inspector URL was present)."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Strip any trailing slash so Playwright's baseURL joins cleanly.
          URL="${URL%/}"

          # Vercel protects preview deployments behind SSO by default. A protected
          # URL answers with a 302 to vercel.com/sso-api and a `_vercel_sso_nonce`
          # cookie (NOT a plain 401). If it is protected AND no automation-bypass
          # secret is configured, SKIP with an actionable notice instead of
          # failing red — the bypass is owner-gated setup. With the secret present
          # the smoke sends the bypass header and proceeds. Public URLs (the prod
          # domain) return 2xx with no SSO markers and run normally.
          if [ -z "$BYPASS" ]; then
            HDRS=$(curl -s -D - -o /dev/null -m 20 "$URL" 2>/dev/null || true)
            if printf '%s' "$HDRS" | grep -qiE 'location:[[:space:]]*https://vercel\.com/sso|_vercel_sso_nonce'; then
              echo "::notice title=Smoke skipped (protected preview)::$URL is behind Vercel Deployment Protection and no VERCEL_AUTOMATION_BYPASS_SECRET is set. Add the bypass secret (Vercel → Deployment Protection → Protection Bypass for Automation, mirrored as a repo secret) to smoke protected previews. Production (public domain) is unaffected."
              echo "skip=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          echo "Smoking: $URL"
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Checkout
        if: steps.target.outputs.skip != 'true'
        uses: actions/checkout@v7

      - name: Setup Bun
        if: steps.target.outputs.skip != 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        if: steps.target.outputs.skip != 'true'
        run: bun install --frozen-lockfile

      - name: Install Playwright Chromium
        if: steps.target.outputs.skip != 'true'
        run: bunx playwright install --with-deps chromium

      - name: Run smoke suite
        if: steps.target.outputs.skip != 'true'
        env:
          E2E_BASE_URL: ${{ steps.target.outputs.url }}
          # Sent as the x-vercel-protection-bypass header when set, so the smoke
          # reaches protected preview deployments. Empty/unset for public URLs.
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: bun run test:smoke

      # Accessibility (axe-core, WCAG 2 A/AA) over the key storefront routes.
      # This suite existed from Stage 7 P4 but ran in NO workflow, so a serious
      # violation could reach production with CI fully green — which is exactly
      # what happened on 2026-07-19 (a footer link distinguished by colour alone,
      # link-in-text-block, on all six routes rendering the footer).
      #
      # `always()` so a smoke failure above does not mask the a11y result; the
      # skip guard still applies.
      - name: Run a11y suite (axe WCAG 2 A/AA)
        if: ${{ always() && steps.target.outputs.skip != 'true' && steps.target.outputs.url != '' }}
        env:
          E2E_BASE_URL: ${{ steps.target.outputs.url }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: bun run test:a11y

      - name: Upload Playwright report
        if: ${{ failure() && steps.target.outputs.skip != 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
