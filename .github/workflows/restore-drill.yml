name: Restore drill

# The actual P6 deliverable: prove the logical backup RESTORES into a working
# database, on a schedule, automatically. "A backup you've never restored is not
# a backup." Each run: dump prod → restore into a throwaway local Supabase stack
# → verify (schemas/tables/RPCs/RLS present, catalog data back, a read RPC runs)
# → record RTO. Nothing here touches production beyond the read-only dump.
#
# Runs weekly and on demand. Uses the same dump path as backup.yml (scripts/
# backup-db.sh), so a green drill validates the real backup mechanism.

on:
  schedule:
    - cron: "30 3 * * 1" # Mondays 03:30 UTC
  workflow_dispatch:

concurrency:
  group: restore-drill-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  SUPABASE_CLI_VERSION: "2.33.9"

jobs:
  drill:
    name: Dump prod → restore → verify (record RTO)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Preflight — DB credentials
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_PROJECT_ID" ] || [ -z "$SUPABASE_DB_PASSWORD" ]; then
            echo "::error title=Restore drill cannot run::Requires SUPABASE_ACCESS_TOKEN, SUPABASE_PROJECT_ID and SUPABASE_DB_PASSWORD."
            exit 1
          fi

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: ${{ env.SUPABASE_CLI_VERSION }}

      - name: Initialize local Supabase config (expose api schema)
        run: |
          if [ ! -f supabase/config.toml ]; then
            supabase init
          fi
          if ! grep -qE '^\s*schemas\s*=.*"api"' supabase/config.toml; then
            sed -i -E 's/^(\s*schemas\s*=\s*\[)([^]]*)\]/\1\2, "api"]/' supabase/config.toml
          fi

      - name: Boot throwaway local stack (managed base + migrations)
        run: supabase start -x edge-runtime,studio,imgproxy,vector,logflare,inbucket,realtime

      - name: Dump production (the backup under test)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_CLI_VERSION: ${{ env.SUPABASE_CLI_VERSION }}
        run: |
          # supabase init above wrote a config linked to a local ref; re-link to
          # prod is handled inside backup-db.sh. Run the real backup path.
          bash scripts/backup-db.sh backup

      - name: Sanity-check dump files
        run: |
          command -v psql >/dev/null || { sudo apt-get update && sudo apt-get install -y postgresql-client; }
          test -s backup/schema.sql || { echo "schema.sql empty"; exit 1; }
          grep -q 'CREATE TABLE' backup/schema.sql || { echo "schema.sql has no tables"; exit 1; }
          test -s backup/data.sql || { echo "data.sql empty"; exit 1; }
          grep -q 'COPY ' backup/data.sql || { echo "data.sql has no COPY blocks"; exit 1; }
          echo "Dump files look well-formed."
          cat backup/MANIFEST.txt

      - name: Restore data into the local stack (record RTO)
        run: |
          DB_URL=$(supabase status -o env 2>/dev/null | sed -n 's/^DB_URL=//p' | tr -d '"')
          [ -z "$DB_URL" ] && DB_URL="postgresql://postgres:postgres@127.0.0.1:54322/postgres"
          echo "Restoring into $DB_URL"

          START=$(date +%s)
          # Rebuild the app schemas from the BACKUP's OWN schema.sql — a real DR
          # restores prod's schema, not the repo's. This also makes the drill
          # immune to prod/repo drift (e.g. audit_logs.id / ip_address). Supabase
          # keeps extensions in the `extensions` schema, so dropping `public` here
          # does NOT remove pgcrypto/uuid-ossp etc.
          psql "$DB_URL" -v ON_ERROR_STOP=1 <<'SQL'
          DROP SCHEMA IF EXISTS api CASCADE;
          DROP SCHEMA IF EXISTS private CASCADE;
          DROP SCHEMA IF EXISTS public CASCADE;
          CREATE SCHEMA public;
          GRANT USAGE ON SCHEMA public TO anon, authenticated, service_role;
          SQL

          # Recreate prod's exact schema, then load rows with FK checks + triggers
          # disabled (replica) so load order / cross-schema FKs don't matter.
          psql "$DB_URL" -v ON_ERROR_STOP=1 -f backup/schema.sql
          psql "$DB_URL" -v ON_ERROR_STOP=1 -c "SET session_replication_role = replica;" -f backup/data.sql

          # Customer identities are BEST-EFFORT: the local CLI's bundled GoTrue
          # schema can differ from prod's, so a column mismatch must not fail the
          # drill — app data already restored (FK checks disabled). A real DR
          # restores into a Supabase project whose auth schema matches.
          psql "$DB_URL" -c "SET session_replication_role = replica;" -f backup/auth.sql \
            || echo "::warning title=Auth data partial::auth.sql load was partial (GoTrue schema drift between prod and the local CLI) — app data restored regardless."

          END=$(date +%s)
          echo "RTO_SECONDS=$((END - START))" >> "$GITHUB_ENV"
          echo "Restore completed in $((END - START))s."

      - name: Verify the restored copy (read-only invariants)
        run: |
          DB_URL=$(supabase status -o env 2>/dev/null | sed -n 's/^DB_URL=//p' | tr -d '"')
          [ -z "$DB_URL" ] && DB_URL="postgresql://postgres:postgres@127.0.0.1:54322/postgres"
          psql "$DB_URL" -v ON_ERROR_STOP=1 -f supabase/tests/restore_verify.sql

      - name: Drill summary
        if: always()
        run: |
          {
            echo "## Restore drill result"
            echo ""
            echo "- **RTO (restore time):** ${RTO_SECONDS:-n/a}s (dump excluded; restore + load only)"
            echo "- **RPO:** = backup cadence (daily backup.yml → ≤24h data-loss window)"
            echo "- **Method:** dump prod → restore into throwaway local Supabase stack → read-only invariants"
            echo ""
            echo '```'
            cat backup/MANIFEST.txt 2>/dev/null || echo "(no manifest)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Tear down
        if: always()
        run: supabase stop --no-backup || true
